["Biome Provider"]
	#If Terrablender and Biolith are installed at the same time, Terrablender is used by default. Set this to false to use Biolith.
	#If only one is installed, Darker Depths will use whichever is available.
	prioritize_terrablender = true

	["Biome Parameters".Terrablender]
		#Darker Depths Terrablender region weight
		# Default: 4
		# Range: > 0
		weight = 4
		#Biome parameters are set to much more lenient values for Terrablender due to regions. To disable the defaults and use the config parameters, set this to false.
		use_default_biome_params_terrablender = true

	#These values will only be used when using biolith unless defaults for Terrablender are turned off.
	#Climate parameters for the sandy_catacombs biome.
	["Biome Parameters".sandy_catacombs]
		# Default: 0.5
		# Range: -2.0 ~ 2.0
		temperature_min = 0.5
		# Default: 0.9
		# Range: -2.0 ~ 2.0
		temperature_max = 0.9
		# Default: -0.8
		# Range: -2.0 ~ 2.0
		humidity_min = -0.8
		# Default: -0.1
		# Range: -2.0 ~ 2.0
		humidity_max = -0.1
		# Default: 0.2
		# Range: -2.0 ~ 2.0
