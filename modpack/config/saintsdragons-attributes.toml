	aggressive_wild = false
	#Allow this dragon to damage/destroy blocks with abilities and movement
	griefing_enabled = true
	#Reactive terrain clearing (requires mobGriefing)
	reactive_terrain_clearing_on_damage = true
	reactive_terrain_clearing_on_damage_tamed = false

