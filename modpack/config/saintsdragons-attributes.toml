	wild_flying_speed_multiplier = 1.0
	#Ability Damage
	# Default: 12.0
	# Range: 0.0 ~ 100000.0
	bite_damage = 12.0
	# Default: 20.0
	# Range: 0.0 ~ 100000.0
	magma_volley_damage = 20.0
	# Default: 3.0
	# Range: 0.0 ~ 100000.0
	fire_body_damage = 3.0
	#Taming Chances (lower = easier)
	# Default: 4.0
	# Range: 1.0 ~ 20.0
	taming_chance_base = 4.0
	# Default: 3.0
	# Range: 1.0 ~ 20.0
	taming_chance_chicken = 3.0
	# Default: 2.0
	# Range: 1.0 ~ 20.0
	taming_chance_hearty = 2.0
	#Eggs (1 in N chance per random tick)
	# Default: 2.0
	# Range: 1.0 ~ 200.0
	egg_hatch_chance_normal = 2.0
	#Egg drop chance (0-1)
	# Default: 0.12
	# Range: 0.0 ~ 1.0
	egg_drop_chance = 0.12
	#Direct blast damage on Fire Body crash impact
	# Default: 200.0
	# Range: 0.0 ~ 100000.0
	fire_body_explosion_damage = 200.0
	#Self-damage applied to Cindervane after Fire Body crash impact
	# Default: 40.0
	# Range: 0.0 ~ 1000.0
	fire_body_self_damage_on_crash = 40.0
